    <script>
      (function() {
        try {
          var cached = localStorage.getItem('agenthr-branding:v1');
          if (cached) {
            var parsed = JSON.parse(cached);
            if (parsed.data) {
              if (parsed.data.app_name) {
                document.title = parsed.data.app_tagline 
                  ? parsed.data.app_name + ' - ' + parsed.data.app_tagline 
                  : parsed.data.app_name;
              }
              if (parsed.data.favicon_url) {
                var favicon = document.getElementById('dynamic-favicon');
                if (favicon) favicon.href = parsed.data.favicon_url;
              }
            }
          }
        } catch(e) {}
      })();
    </script>
